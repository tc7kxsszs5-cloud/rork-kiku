name: RegressProof

on:
  pull_request:
  workflow_dispatch:

jobs:
  regressproof:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify RegressProof MVP
        id: regressproof
        run: |
          mkdir -p regressproof-artifacts/mvp
          node regressproof/scripts/verify-mvp.js \
            --repo "$GITHUB_WORKSPACE" \
            --out-dir regressproof-artifacts/mvp | tee regressproof-artifacts/mvp/verify-mvp.stdout.json

      - name: Print RegressProof MVP Summary
        run: |
          node -e "const fs=require('fs'); const summary=JSON.parse(fs.readFileSync('regressproof-artifacts/mvp/regressproof-mvp-summary.json','utf8')); console.log('status=' + summary.status); console.log('fixture_suite=' + summary.fixtureSuite.passedCount + '/' + summary.fixtureSuite.totalFixtures); console.log('real_scenario=' + summary.realScenario.verdict + '/' + summary.realScenario.confidence); console.log('deep_scenario=' + summary.deepScenario.verdict + '/' + summary.deepScenario.confidence);"

      - name: Upload RegressProof Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: regressproof-artifacts
          path: regressproof-artifacts/
